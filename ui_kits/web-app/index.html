<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grinta — UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Geist', 'Geist Sans', ui-sans-serif, system-ui, sans-serif; }
  input, select, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #1a3535; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Theme.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Layout.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Teams.jsx"></script>
<script type="text/babel" src="Exercises.jsx"></script>
<script type="text/babel" src="Planner.jsx"></script>
<script type="text/babel" src="Auth.jsx"></script>

<script type="text/babel">
function App() {
  const [screen, setScreen] = React.useState("auth");
  const [page, setPage]     = React.useState("dashboard");
  const [dark, setDark]     = React.useState(false);

  const pages = { dashboard: Dashboard, teams: Teams, exercises: Exercises, planner: Planner };
  const PageComponent = pages[page] || Dashboard;

  return (
    <ThemeProvider dark={dark}>
      {screen === "auth" ? (
        <Auth onLogin={() => setScreen("app")} />
      ) : (
        <AppShell
          active={page}
          onNav={setPage}
          userName="Alex Martin"
          dark={dark}
          onToggleDark={() => setDark(d => !d)}
        >
          <PageComponent onNav={setPage} />
        </AppShell>
      )}
    </ThemeProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
