<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geist', sans-serif; background: #f4f4f5; padding: 16px; display: flex; gap: 12px; }

  .mode { flex: 1; border-radius: 12px; overflow: hidden; border: 1px solid rgba(0,0,0,0.08); }

  /* ── LIGHT MODE ─────────────────── */
  .light { background: #ffffff; }
  .light .topbar { height: 48px; border-bottom: 1px solid #e4e4e7; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
  .light .logo   { font-size: 15px; font-weight: 700; color: #0A0A0A; display: flex; align-items: center; gap: 7px; }
  .light .ball   { width: 22px; height: 22px; border-radius: 50%; background: #0ECECE; }
  .light .nav    { display: flex; gap: 1px; flex-direction: column; padding: 8px 6px; border-right: 1px solid #e4e4e7; width: 140px; float: left; height: 100%; background: #fff; }
  .light .nav-item { display: flex; align-items: center; gap: 7px; padding: 6px 10px; border-radius: 6px; font-size: 12px; color: #52525b; cursor: pointer; }
  .light .nav-item.active { background: #ecfffe; color: #056868; font-weight: 500; }
  .light .content { padding: 14px; }
  .light .card   { background: #fff; border: 1px solid #e4e4e7; border-radius: 8px; padding: 12px; }
  .light .btn-primary { background: #0ECECE; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .light .badge  { background: #ecfffe; color: #056868; border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 500; }
  .light .mode-label { font-size: 10px; font-weight: 500; color: #71717a; text-transform: uppercase; letter-spacing: .05em; padding: 6px 12px 0; }

  /* ── DARK MODE ──────────────────── */
  .dark { background: #0A1A1A; }
  .dark .topbar { height: 48px; border-bottom: 1px solid #1e3535; background: #0A1A1A; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; }
  .dark .logo   { font-size: 15px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 7px; }
  .dark .ball   { width: 22px; height: 22px; border-radius: 50%; background: #0ECECE; }
  .dark .nav    { display: flex; gap: 1px; flex-direction: column; padding: 8px 6px; border-right: 1px solid #1e3535; width: 140px; float: left; height: 100%; background: #0A1A1A; }
  .dark .nav-item { display: flex; align-items: center; gap: 7px; padding: 6px 10px; border-radius: 6px; font-size: 12px; color: #7acfcf; cursor: pointer; }
  .dark .nav-item.active { background: #0d2e2e; color: #0ECECE; font-weight: 500; }
  .dark .content { padding: 14px; }
  .dark .card   { background: #0d2020; border: 1px solid #1e3535; border-radius: 8px; padding: 12px; }
  .dark .btn-primary { background: #0ECECE; color: #0A1A1A; border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .dark .badge  { background: #0d3535; color: #0ECECE; border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 500; }
  .dark .mode-label { font-size: 10px; font-weight: 500; color: #4a8a8a; text-transform: uppercase; letter-spacing: .05em; padding: 6px 12px 0; }
  .dark .text-main { color: #f0fafa; }
  .dark .text-muted { color: #4a8a8a; }

  .light .text-main { color: #18181b; }
  .light .text-muted { color: #71717a; }

  .body { display: flex; height: 160px; overflow: hidden; }
  .nav-area { display: flex; flex-direction: column; }
  .main-area { flex: 1; }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.35; }
</style>
</head>
<body>

  <!-- LIGHT -->
  <div class="mode light">
    <div class="mode-label">Day</div>
    <div class="topbar">
      <div class="logo"><div class="ball"></div>Grinta</div>
      <button class="btn-primary">+ New session</button>
    </div>
    <div class="body">
      <div class="nav">
        <div class="nav-item active">▪ Dashboard</div>
        <div class="nav-item">▪ Teams</div>
        <div class="nav-item">▪ Exercises</div>
        <div class="nav-item">▪ Planner</div>
      </div>
      <div class="main-area" style="padding:10px; display:flex; flex-direction:column; gap:8px;">
        <div class="text-main" style="font-size:14px; font-weight:600;">Dashboard</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
          <div class="card"><div class="text-muted" style="font-size:10px">Teams</div><div class="text-main" style="font-size:18px; font-weight:600">3</div></div>
          <div class="card"><div class="text-muted" style="font-size:10px">Exercises</div><div class="text-main" style="font-size:18px; font-weight:600">24</div></div>
        </div>
        <div style="display:flex; gap:5px;"><span class="badge">Tactical</span><span class="badge">90 min</span><span class="badge">High</span></div>
      </div>
    </div>
  </div>

  <!-- DARK -->
  <div class="mode dark">
    <div class="mode-label">Night</div>
    <div class="topbar">
      <div class="logo"><div class="ball"></div>Grinta</div>
      <button class="btn-primary">+ New session</button>
    </div>
    <div class="body">
      <div class="nav">
        <div class="nav-item active">▪ Dashboard</div>
        <div class="nav-item">▪ Teams</div>
        <div class="nav-item">▪ Exercises</div>
        <div class="nav-item">▪ Planner</div>
      </div>
      <div class="main-area" style="padding:10px; display:flex; flex-direction:column; gap:8px;">
        <div class="text-main" style="font-size:14px; font-weight:600;">Dashboard</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
          <div class="card"><div class="text-muted" style="font-size:10px">Teams</div><div class="text-main" style="font-size:18px; font-weight:600">3</div></div>
          <div class="card"><div class="text-muted" style="font-size:10px">Exercises</div><div class="text-main" style="font-size:18px; font-weight:600">24</div></div>
        </div>
        <div style="display:flex; gap:5px;"><span class="badge">Tactical</span><span class="badge">90 min</span><span class="badge">High</span></div>
      </div>
    </div>
  </div>

</body>
</html>
