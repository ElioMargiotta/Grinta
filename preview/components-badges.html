<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geist', sans-serif; background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; border-radius: 4px;
    padding: 3px 8px; font-size: 12px; font-weight: 500;
  }
  .section-label { font-size: 11px; color: #a1a1aa; text-transform: uppercase; letter-spacing: .05em; }
  /* Categories */
  .cat-warmup    { background: #fef9c3; color: #854d0e; }
  .cat-technical { background: #dbeafe; color: #1e40af; }
  .cat-tactical  { background: #dcfce7; color: #166534; }
  .cat-physical  { background: #fce7f3; color: #9d174d; }
  .cat-cooldown  { background: #e0f2fe; color: #075985; }
  /* Intensity */
  .int-low    { background: #f4f4f5; color: #52525b; }
  .int-medium { background: #e4e4e7; color: #27272a; }
  .int-high   { background: #18181b; color: #fff; }
  /* Status */
  .status-ok  { background: #dcfce7; color: #166534; }
  .status-err { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>
  <div class="section-label">Exercise categories</div>
  <div class="row">
    <span class="badge cat-warmup">Warmup</span>
    <span class="badge cat-technical">Technical</span>
    <span class="badge cat-tactical">Tactical</span>
    <span class="badge cat-physical">Physical</span>
    <span class="badge cat-cooldown">Cooldown</span>
  </div>
  <div class="section-label">Intensity</div>
  <div class="row">
    <span class="badge int-low">Low</span>
    <span class="badge int-medium">Medium</span>
    <span class="badge int-high">High</span>
  </div>
  <div class="section-label">Status</div>
  <div class="row">
    <span class="badge status-ok">Saved</span>
    <span class="badge status-err">Error</span>
  </div>
</body>
</html>
