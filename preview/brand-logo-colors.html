<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geist', sans-serif; background: #f4f4f5; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-size: 10px; font-weight: 500; color: #a1a1aa; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .logo-card { border-radius: 12px; padding: 22px 28px; display: flex; align-items: center; gap: 16px; }
  .on-light { background: #fff; border: 1px solid #e4e4e7; }
  .on-dark  { background: #0A1A1A; }
  .on-brand { background: #0ECECE; }
  .on-mid   { background: #fff; border: 1px solid #e4e4e7; justify-content: space-around; }
  .wordmark { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: 3px; text-transform: uppercase; line-height: 1; }
  .tagline  { font-family: 'Barlow Condensed', sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
</style>
</head>
<body>

<div class="section-label">Grinta — Logo system</div>

<div class="row">

  <!-- Light background -->
  <div class="logo-card on-light">
    <!-- G Mark 52px dark -->
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="52" rx="14" fill="#0A1A1A"/>
      <circle cx="26" cy="26" r="18.5" stroke="#0ECECE" stroke-width="2.8"
        stroke-dasharray="87.6 29.2" stroke-dashoffset="-29.2"
        stroke-linecap="round" fill="none"/>
      <circle cx="39" cy="13" r="2.4" fill="#0ECECE"/>
      <text x="26" y="33" text-anchor="middle"
        font-family="'Barlow Condensed', sans-serif" font-weight="800"
        font-size="23" fill="#ffffff" letter-spacing="-0.5">G</text>
    </svg>
    <div>
      <div class="wordmark" style="color:#0A0A0A">GRINTA</div>
      <div class="tagline" style="color:#71717a">Plan · Prepare · Perform</div>
    </div>
  </div>

  <!-- Dark background -->
  <div class="logo-card on-dark">
    <!-- G Mark 52px turquoise bg -->
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="52" rx="14" fill="#0ECECE"/>
      <circle cx="26" cy="26" r="18.5" stroke="#0A1A1A" stroke-width="2.8"
        stroke-dasharray="87.6 29.2" stroke-dashoffset="-29.2"
        stroke-linecap="round" fill="none" opacity="0.4"/>
      <circle cx="39" cy="13" r="2.4" fill="#0A1A1A" opacity="0.6"/>
      <text x="26" y="33" text-anchor="middle"
        font-family="'Barlow Condensed', sans-serif" font-weight="800"
        font-size="23" fill="#0A1A1A" letter-spacing="-0.5">G</text>
    </svg>
    <div>
      <div class="wordmark" style="color:#ffffff">GRINTA</div>
      <div class="tagline" style="color:rgba(255,255,255,0.55)">Plan · Prepare · Perform</div>
    </div>
  </div>

  <!-- Brand/turquoise background -->
  <div class="logo-card on-brand">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="52" rx="14" fill="#0A1A1A"/>
      <circle cx="26" cy="26" r="18.5" stroke="#fff" stroke-width="2.8"
        stroke-dasharray="87.6 29.2" stroke-dashoffset="-29.2"
        stroke-linecap="round" fill="none" opacity="0.7"/>
      <circle cx="39" cy="13" r="2.4" fill="#fff" opacity="0.9"/>
      <text x="26" y="33" text-anchor="middle"
        font-family="'Barlow Condensed', sans-serif" font-weight="800"
        font-size="23" fill="#ffffff" letter-spacing="-0.5">G</text>
    </svg>
    <div>
      <div class="wordmark" style="color:#0A1A1A">GRINTA</div>
      <div class="tagline" style="color:rgba(10,26,26,0.65)">Plan · Prepare · Perform</div>
    </div>
  </div>

  <!-- Mark size ramp -->
  <div class="logo-card on-mid">
    <!-- 64px -->
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="17" fill="#0A1A1A"/><circle cx="32" cy="32" r="23" stroke="#0ECECE" stroke-width="3.5" stroke-dasharray="108.7 36.2" stroke-dashoffset="-36.2" stroke-linecap="round" fill="none"/><circle cx="48.3" cy="15.7" r="3" fill="#0ECECE"/><text x="32" y="41" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="28" fill="#fff" letter-spacing="-0.5">G</text></svg>
    <!-- 40px -->
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="11" fill="#0A1A1A"/><circle cx="20" cy="20" r="14.2" stroke="#0ECECE" stroke-width="2.2" stroke-dasharray="67.2 22.4" stroke-dashoffset="-22.4" stroke-linecap="round" fill="none"/><circle cx="30" cy="10" r="1.8" fill="#0ECECE"/><text x="20" y="26" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="18" fill="#fff" letter-spacing="-0.5">G</text></svg>
    <!-- 28px -->
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#0A1A1A"/><circle cx="14" cy="14" r="10" stroke="#0ECECE" stroke-width="1.8" stroke-dasharray="47.1 15.7" stroke-dashoffset="-15.7" stroke-linecap="round" fill="none"/><circle cx="21" cy="7" r="1.3" fill="#0ECECE"/><text x="14" y="18.5" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="13" fill="#fff" letter-spacing="-0.5">G</text></svg>
    <!-- 20px -->
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="5" fill="#0A1A1A"/><circle cx="10" cy="10" r="7" stroke="#0ECECE" stroke-width="1.5" stroke-dasharray="33 11" stroke-dashoffset="-11" stroke-linecap="round" fill="none"/><circle cx="15" cy="5" r="1" fill="#0ECECE"/><text x="10" y="13.5" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="9" fill="#fff" letter-spacing="-0.5">G</text></svg>
  </div>

</div>

<!-- Turquoise scale strip -->
<div>
  <div class="section-label">Brand color — Turquoise</div>
  <div style="display:flex; gap:4px;">
    <div style="flex:1;height:36px;border-radius:6px;background:#ecfffe;border:1px solid rgba(0,0,0,.05)"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#c4fffe;border:1px solid rgba(0,0,0,.05)"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#80f8f5;border:1px solid rgba(0,0,0,.05)"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#32edea;border:1px solid rgba(0,0,0,.05)"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#0ECECE;outline:2px solid #0ECECE;outline-offset:2px;position:relative"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#0aacac"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#068a8a"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#056868"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#034545"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#022929"></div>
    <div style="flex:1;height:36px;border-radius:6px;background:#0A1A1A"></div>
  </div>
</div>

</body>
</html>
