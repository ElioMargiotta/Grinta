<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geist', sans-serif; background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid #f4f4f5; padding-bottom: 10px; }
  .meta { min-width: 90px; font-size: 10px; color: #a1a1aa; font-family: monospace; line-height: 1.5; }
  .specimen { color: #18181b; }
  .xs   { font-size: 12px; }
  .sm   { font-size: 14px; }
  .base { font-size: 16px; }
  .lg   { font-size: 18px; font-weight: 600; }
  .xl   { font-size: 20px; font-weight: 600; }
  .xxl  { font-size: 24px; font-weight: 600; letter-spacing: -0.015em; }
</style>
</head>
<body>
  <div class="row"><div class="meta">xs / 12px / 400</div><div class="specimen xs">Plan your football season.</div></div>
  <div class="row"><div class="meta">sm / 14px / 400</div><div class="specimen sm">Plan your football season.</div></div>
  <div class="row"><div class="meta">base / 16px / 400</div><div class="specimen base">Plan your football season.</div></div>
  <div class="row"><div class="meta">lg / 18px / 600</div><div class="specimen lg">Season planner</div></div>
  <div class="row"><div class="meta">xl / 20px / 600</div><div class="specimen xl">Exercise library</div></div>
  <div class="row"><div class="meta">2xl / 24px / 600</div><div class="specimen xxl">Welcome back, Coach.</div></div>
</body>
</html>
